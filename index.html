<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DBMS Mock Quiz</title>
<style>
  :root{
    --bg:#0f1117;
    --card:#171a23;
    --border:#2a2e3a;
    --text:#e8eaf0;
    --muted:#9099ab;
    --accent:#6c8cff;
    --correct:#2ecc71;
    --wrong:#ff5c5c;
    --correct-bg:rgba(46,204,113,0.12);
    --wrong-bg:rgba(255,92,92,0.12);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);
    color:var(--text);
    padding:24px 12px 60px;
  }
  .wrap{max-width:760px;margin:0 auto;}
  h1{font-size:22px;margin:0 0 4px;}
  .sub{color:var(--muted);font-size:14px;margin-bottom:20px;}
  #progressBar{
    position:sticky;top:0;background:var(--bg);padding:10px 0 14px;z-index:10;
  }
  #progressBar .track{height:6px;background:var(--border);border-radius:4px;overflow:hidden;}
  #progressBar .fill{height:100%;background:var(--accent);width:0%;transition:width .2s;}
  #progressBar .label{font-size:12px;color:var(--muted);margin-top:6px;display:flex;justify-content:space-between;}
  .qcard{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:12px;
    padding:18px 18px 14px;
    margin-bottom:14px;
  }
  .qhead{display:flex;gap:8px;font-size:15px;line-height:1.45;margin-bottom:12px;}
  .qnum{color:var(--accent);font-weight:600;white-space:nowrap;}
  .opt{
    display:flex;align-items:flex-start;gap:10px;
    padding:10px 12px;border-radius:8px;border:1px solid var(--border);
    margin-bottom:8px;cursor:pointer;font-size:14px;line-height:1.4;
    background:#1d2130;
    transition:background .15s, border-color .15s;
  }
  .opt:hover{border-color:var(--accent);}
  .opt input{margin-top:3px;accent-color:var(--accent);flex-shrink:0;}
  .opt.selected{border-color:var(--accent);background:rgba(108,140,255,0.1);}
  .opt.correct{border-color:var(--correct);background:var(--correct-bg);}
  .opt.wrong{border-color:var(--wrong);background:var(--wrong-bg);}
  .tag{font-size:11px;padding:1px 8px;border-radius:20px;margin-left:6px;font-weight:600;}
  .tag.correct{background:var(--correct);color:#04160c;}
  .tag.wrong{background:var(--wrong);color:#210505;}
  code, .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;}
  #controls{
    position:sticky;bottom:0;background:linear-gradient(to top, var(--bg) 70%, transparent);
    padding:16px 0 4px;display:flex;gap:10px;justify-content:center;
  }
  button{
    background:var(--accent);color:#0b0d13;border:none;border-radius:10px;
    padding:12px 22px;font-size:15px;font-weight:600;cursor:pointer;
  }
  button.secondary{background:#2a2e3a;color:var(--text);}
  button:disabled{opacity:0.5;cursor:not-allowed;}
  #resultCard{
    background:var(--card);border:1px solid var(--border);border-radius:14px;
    padding:24px;text-align:center;margin-bottom:20px;
  }
  #resultCard .score{font-size:42px;font-weight:800;color:var(--accent);}
  #resultCard .pct{color:var(--muted);font-size:14px;margin-top:4px;}
  .hidden{display:none !important;}
  #jumpBar{font-size:12px;color:var(--muted);text-align:center;margin:6px 0 18px;}
</style>
</head>
<body>
<div class="wrap">
  <h1>DBMS Mock Quiz</h1>
  <div class="sub">70 questions · +1 for correct, 0 for wrong · Answer all, then submit to see your score</div>

  <div id="progressBar">
    <div class="track"><div class="fill" id="fillBar"></div></div>
    <div class="label"><span id="answeredCount">0 / 70 answered</span><span id="liveScore"></span></div>
  </div>

  <div id="resultCard" class="hidden">
    <div class="score" id="scoreText">0 / 70</div>
    <div class="pct" id="pctText"></div>
  </div>

  <div id="quizContainer"></div>

  <div id="controls">
    <button class="secondary" id="resetBtn">Reset</button>
    <button id="submitBtn">Submit Quiz</button>
  </div>
</div>

let answers = new Array(questions.length).fill(null);
let submitted = false;
const container = document.getElementById('quizContainer');
const letters = ['A','B','C','D','E'];

function render(){
  container.innerHTML = '';
  questions.forEach((qu, qi) => {
    const card = document.createElement('div');
    card.className = 'qcard';
    const head = document.createElement('div');
    head.className = 'qhead';
    head.innerHTML = `<span class="qnum">Q${qi+1}.</span><span>${qu.q}</span>`;
    card.appendChild(head);
    qu.o.forEach((opt, oi) => {
      const label = document.createElement('label');
      label.className = 'opt';
      label.dataset.qi = qi;
      label.dataset.oi = oi;
      label.innerHTML = `<input type="radio" name="q${qi}" value="${oi}"><span class="mono" style="white-space:pre-wrap">${opt}</span>`;
      label.addEventListener('click', () => {
        if(submitted) return;
        answers[qi] = oi;
        updateSelectionUI(qi);
        updateProgress();
      });
      card.appendChild(label);
    });
    container.appendChild(card);
  });
}

function updateSelectionUI(qi){
  document.querySelectorAll(`.opt[data-qi="${qi}"]`).forEach(el=>{
    const oi = parseInt(el.dataset.oi);
    el.classList.toggle('selected', answers[qi]===oi);
    el.querySelector('input').checked = answers[qi]===oi;
  });
}

function updateProgress(){
  const answered = answers.filter(a=>a!==null).length;
  document.getElementById('answeredCount').textContent = `${answered} / ${questions.length} answered`;
  document.getElementById('fillBar').style.width = (answered/questions.length*100)+'%';
}

function submitQuiz(){
  submitted = true;
  let score = 0;
  questions.forEach((qu, qi) => {
    const isCorrect = answers[qi] === qu.c;
    if(isCorrect) score++;
    document.querySelectorAll(`.opt[data-qi="${qi}"]`).forEach(el=>{
      const oi = parseInt(el.dataset.oi);
      el.style.pointerEvents = 'none';
      if(oi === qu.c){
        el.classList.add('correct');
        el.insertAdjacentHTML('beforeend', '<span class="tag correct">Correct</span>');
      } else if(oi === answers[qi] && oi !== qu.c){
        el.classList.add('wrong');
        el.insertAdjacentHTML('beforeend', '<span class="tag wrong">Your answer</span>');
      }
    });
  });
  document.getElementById('resultCard').classList.remove('hidden');
  document.getElementById('scoreText').textContent = `${score} / ${questions.length}`;
  document.getElementById('pctText').textContent = `${(score/questions.length*100).toFixed(1)}% score`;
  document.getElementById('liveScore').textContent = `Score: ${score}/${questions.length}`;
  document.getElementById('submitBtn').disabled = true;
  document.getElementById('resultCard').scrollIntoView({behavior:'smooth'});
}

function resetQuiz(){
  submitted = false;
  answers = new Array(questions.length).fill(null);
  document.getElementById('resultCard').classList.add('hidden');
  document.getElementById('submitBtn').disabled = false;
  document.getElementById('liveScore').textContent = '';
  render();
  updateProgress();
  window.scrollTo({top:0, behavior:'smooth'});
}

document.getElementById('submitBtn').addEventListener('click', submitQuiz);
document.getElementById('resetBtn').addEventListener('click', resetQuiz);

render();
updateProgress();
</script>
</body>
</html>
