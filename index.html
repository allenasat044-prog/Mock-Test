<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DBMS Quiz</title>
<style>
  :root{
    --ink:#1b1f23;
    --paper:#f6f4ee;
    --card:#ffffff;
    --line:#e3ddd0;
    --accent:#3457d5;
    --accent-ink:#1c2c66;
    --good:#1f8a55;
    --good-bg:#e7f5ec;
    --bad:#c23b3b;
    --bad-bg:#fbeaea;
    --muted:#767268;
    font-family: 'IBM Plex Mono', 'Courier New', monospace;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family: 'Georgia', 'Times New Roman', serif;
    display:flex;
    justify-content:center;
    padding:28px 16px 60px;
  }
  .wrap{width:100%;max-width:720px;}
  .masthead{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    border-bottom:3px solid var(--ink);
    padding-bottom:10px;
    margin-bottom:22px;
  }
  .masthead h1{
    font-size:1.5rem;
    margin:0;
    letter-spacing:0.02em;
    font-weight:700;
  }
  .masthead .tag{
    font-family:'IBM Plex Mono','Courier New',monospace;
    font-size:0.72rem;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:0.08em;
  }
  .progress-row{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:18px;
    font-family:'IBM Plex Mono','Courier New',monospace;
    font-size:0.78rem;
    color:var(--muted);
  }
  .progress-track{
    flex:1;
    height:6px;
    background:var(--line);
    border-radius:4px;
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    background:var(--accent);
    width:0%;
    transition:width .25s ease;
  }
  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:6px;
    padding:26px 24px;
    box-shadow:0 1px 0 var(--line);
  }
  .q-number{
    font-family:'IBM Plex Mono','Courier New',monospace;
    font-size:0.75rem;
    color:var(--accent-ink);
    letter-spacing:0.06em;
    margin-bottom:8px;
    text-transform:uppercase;
  }
  .q-text{
    font-size:1.12rem;
    line-height:1.5;
    margin:0 0 20px;
  }
  .options{
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .option{
    display:flex;
    align-items:flex-start;
    gap:12px;
    border:1px solid var(--line);
    border-radius:5px;
    padding:12px 14px;
    cursor:pointer;
    background:#fdfcf9;
    transition:border-color .15s, background .15s;
    font-size:0.98rem;
    line-height:1.45;
  }
  .option:hover{border-color:var(--accent);}
  .option.selected{
    border-color:var(--accent);
    background:#eef1fc;
  }
  .option.correct{
    border-color:var(--good);
    background:var(--good-bg);
  }
  .option.incorrect{
    border-color:var(--bad);
    background:var(--bad-bg);
  }
  .option .letter{
    font-family:'IBM Plex Mono','Courier New',monospace;
    font-weight:700;
    font-size:0.82rem;
    color:var(--muted);
    min-width:18px;
  }
  .option.correct .letter{color:var(--good);}
  .option.incorrect .letter{color:var(--bad);}
  .feedback{
    margin-top:14px;
    font-family:'IBM Plex Mono','Courier New',monospace;
    font-size:0.8rem;
    padding:8px 10px;
    border-radius:4px;
  }
  .feedback.good{background:var(--good-bg);color:var(--good);}
  .feedback.bad{background:var(--bad-bg);color:var(--bad);}
  .nav-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:22px;
  }
  .score-live{
    font-family:'IBM Plex Mono','Courier New',monospace;
    font-size:0.78rem;
    color:var(--muted);
  }
  button.next-btn{
    font-family:'IBM Plex Mono','Courier New',monospace;
    background:var(--ink);
    color:var(--paper);
    border:none;
    padding:11px 20px;
    border-radius:4px;
    font-size:0.85rem;
    cursor:pointer;
    letter-spacing:0.02em;
    transition:opacity .15s;
  }
  button.next-btn:disabled{
    opacity:0.35;
    cursor:not-allowed;
  }
  button.next-btn:hover:not(:disabled){opacity:0.85;}

  /* results screen */
  .results{
    text-align:center;
    padding:40px 24px;
  }
  .results .big-score{
    font-size:3.4rem;
    font-weight:700;
    margin:6px 0 2px;
  }
  .results .out-of{
    font-family:'IBM Plex Mono','Courier New',monospace;
    color:var(--muted);
    font-size:0.85rem;
    margin-bottom:22px;
  }
  .results .pct{
    display:inline-block;
    font-family:'IBM Plex Mono','Courier New',monospace;
    font-size:0.85rem;
    padding:5px 12px;
    border-radius:20px;
    background:var(--accent);
    color:#fff;
    margin-bottom:26px;
  }
  .results .msg{
    font-size:1.02rem;
    margin-bottom:26px;
    color:var(--ink);
  }
  .results .btn-row{
    display:flex;
    gap:10px;
    justify-content:center;
  }
  .results button{
    font-family:'IBM Plex Mono','Courier New',monospace;
    padding:11px 18px;
    border-radius:4px;
    font-size:0.82rem;
    cursor:pointer;
    border:1px solid var(--ink);
  }
  .btn-primary{background:var(--ink);color:var(--paper);}
  .btn-secondary{background:transparent;color:var(--ink);}

  .review-list{
    text-align:left;
    margin-top:30px;
    border-top:1px solid var(--line);
    padding-top:20px;
  }
  .review-item{
    font-size:0.88rem;
    padding:8px 0;
    border-bottom:1px solid var(--line);
    display:flex;
    justify-content:space-between;
    gap:10px;
  }
  .review-item .rq{color:var(--muted);font-family:'IBM Plex Mono','Courier New',monospace;font-size:0.78rem;}
  .tick{color:var(--good);font-weight:700;}
  .cross{color:var(--bad);font-weight:700;}

  @media (max-width:520px){
    .card{padding:20px 16px;}
    .masthead h1{font-size:1.2rem;}
    .q-text{font-size:1rem;}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="masthead">
    <h1>DBMS Quiz</h1>
    <div class="tag" id="scoreTag">Score 0 / 0</div>
  </div>

  <div id="quizArea">
    <div class="progress-row">
      <span id="progressLabel">Question 1 of 1</span>
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    </div>
    <div class="card" id="card"></div>
    <div class="nav-row">
      <span class="score-live" id="liveScore">+1 correct آ· 0 wrong</span>
      <button class="next-btn" id="nextBtn" disabled>Next â†’</button>
    </div>
  </div>

  <div id="resultsArea" style="display:none;"></div>
</div>

<script>
const QUESTIONS = [
{q:"Consider the relation Student(RegNo, Name, Address, Phone, ClassID) with FDs: RegNoâ†’{Name,Address}; {Address,Phone}â†’ClassID; Nameâ†’Phone; ClassIDâ†’RegNo. Which of the following are possible sets of candidate keys of Student?",

{q:"Consider the relation Weather(Country, City, DayNo, TimeHr, ProbRain, ProbWind, ProbTemp). {Country,City,DayNo} uniquely identifies {ProbRain,ProbWind,ProbTemp}. TimeHr is identified by DayNo. ProbWind is determined by {ProbRain,ProbTemp}. If Weather is normalized to 2NF, which attribute will be present in both decompositions?",

{q:"Consider ArtExhibition(academy, style, paintingsSold, NetAmount, Artist, ExhibitionLoc) with FDs: {academy,paintingsSold}â†’{Artist,style}; Artistâ†’{style,ExhibitionLoc,NetAmount}; {Artist,ExhibitionLoc}â†’style. Which FD, if added, makes paintingsSold the only candidate key of ArtExhibition?",
 options:["academy â†’ paintingsSold","academy â†’ {NetAmount,Artist}","paintingsSold â†’ ExhibitionLoc","paintingsSold â†’ academy"], correct:3},
{q:"Consider Construction(Company, Material, Type, Cost) with FD1: Companyâ†’Material, FD2: Materialâ†’Type, FD3: Typeâ†’Cost. It is decomposed into Construction1(Company,Type,Cost) and Construction2(Material,Type). Which of the following is true about the decomposition?",

{q:"Consider NewsPaper(PaperName, ArticleNo, Reporter, Editor) with FD1: {PaperName,ArticleNo}â†’Reporter, FD2: {ArticleNo,Reporter}â†’Editor. Which of the following decompositions allow the relations to be in BCNF?",

{q:"A RAID-4 (block-level striping, dedicated parity disk) system has 6 data disks and 1 parity disk. If RAID-5 (distributed parity) is used instead, the number of disks on which data is stored is:",
 options:["7","8","13","14"], correct:0},
{q:"A file is stored on disk in 2048 blocks. External sorting is performed in main memory with buffer size = 9 blocks. The number of block accesses during the sort phase is:",
 options:["18","228","2048","4096"], correct:3},
{q:"Same file (2048 blocks, buffer size = 9 blocks). The number of block accesses during the merge phase is:",

 options:["ceil( b1 / (m âˆ’ 3) )","ceil( b1 / (2 أ— (m âˆ’ 3)) )","ceil( b1 / (4 أ— (m âˆ’ 3)) )","ceil( b1 / (2 أ— (m âˆ’ 2)) )"], correct:0},
{q:"A multi-level index is to be built on key field X of an unordered disk file. Number of records = 13,10,720; record length = 200 bytes; size of X = 13 bytes; size of record pointer = 7 bytes; block size = 2048 bytes (block pointer size = record pointer size). What are the blocking factors for the data file and the index file, respectively?",
 options:["11, 101","10, 103","11, 103","10, 102"], correct:3},
{q:"Same scenario as above (multi-level index on unordered file). What are the number of blocks in the first-level and second-level index files, respectively?",
 options:["1,31,072  , 1286","13,111 , 126","13,110 , 125","12,851 , 126"], correct:3},
{q:"A hard disk has seek time 12ms and rotational delay 3ms. The read/write head is positioned on block 0 of track 20. The maximum time taken for the head to move to block 10 on the same track is:",

{q:"A Cricket Tournament DB has: disk block size = 2 KB (whole records only), data transfer rate = 64000 bytes/sec, seek time = 24ms. Player record size = 128 bytes, disk rotates at 6000 rpm. Approximately how much time is required to know the total runs scored by a player?",

{q:"A 256-gigabyte flash storage system has a page size of 2048 bytes. The flash translation table is stored as an array and 1 gigabyte of space is required to store the table. What is the size of the address of a page?",

{q:"An airplane traffic control system tracks airplanes (id, name, model code), airplane models (code, manufacturer), and airports (code, name, city, state), with landing eligibility decided by model. What are the major entities to be modeled?",

{q:"L1 cache has a capacity of 64 KB, and L2 cache has a capacity of 512 KB. If the block size is 64 bytes in both caches, the number of cache blocks is:",

{q:"A first-level index occupies 1000 blocks. Each second-level index block can store 100 index entries. The number of second-level index blocks required is:",
 options:["10","100","1000","10000"], correct:0},
{q:"A file contains 20,000 fixed-length records, each 100 bytes long. The disk block size is 1000 bytes, and records do not span blocks. The minimum number of data blocks required is:",

{q:"A primary index contains 50,000 entries. Each index entry occupies 20 bytes. The block size is 1000 bytes. How many blocks are required for the first-level index?",
 options:["1000","500","50","2500"], correct:0},
{q:"S1: The following are all examples of trivial FDs â€” Uidâ†’Uid, {DeptId,DeptName}â†’DeptId, {StudId,MobileNum}â†’MobileNum, {LoanNum,AccountNum}â†’{LoanNum,AccountNum}. S2: The following are all examples of non-trivial FDs â€” EmpIdâ†’EmpName, EmpIdâ†’EmpAddress, {StudName,StudDob,StudMobileNum}â†’{StudMobileNum,StudAddress}. Choose the correct option:",
 options:["S1: True; S2: False","S1: True; S2: True","S1: False; S2: True","S1: False; S2: False"], correct:1},
{q:"If F = { EmpName â†’ EmpExperience, {EmpPost,EmpExperience} â†’ EmpSalary }, then F entails which of the following?",

{q:"Consider a relational scheme R and a set of FDs F on it. S1: Lossless, dependency-preserving decomposition of R into 3NF relations wrt F is always possible. S2: Lossless, dependency-preserving decomposition of R into BCNF relations wrt F is always possible.",

{q:"For relation R(A,B,C,D,E,F,G,H,I), S = {ADâ†’G, Aâ†’F, Hâ†’B, FBâ†’D, Dâ†’C, Iâ†’AH}. Which of the following represents Iâپ؛ (closure of I)?",

{q:"For relation Râ€²(A,B,C,D,E,F,G,H,I), Sâ€² = {ADâ†’G, Aâ†’F, Hâ†’B, FBâ†’E, Dâ†’C, Iâ†’AH}. Which of the following represents Iâپ؛ (closure of I)?",

{q:"Consider relation R(part_no, part_description, part_price, supplier_id, supplier_address) with FDs: part_noâ†’part_description; supplier_idâ†’supplier_address; {part_no,supplier_id}â†’part_price. Find the candidate key of relation R:",
 options:["part_no","supplier_id","{supplier_id, part_no}","None of the above"], correct:2},
{q:"Consider relation R(A,B,C,D,E,F,G) with FD set F = {Bâ†’ACD, DEâ†’F, Fâ†’D, Eâ†’FGB, BCGâ†’CE, EGâ†’CD}. Let Fâ€² be a minimal cover of F. Find the incorrect statement about Fâ€²:",
 options:["Fâ€² contains Fâ†’D","Fâ€² does not contain DEâ†’F","Fâ€² does not contain EGâ†’CD","Fâ€² does not contain BGâ†’E"], correct:3},
{q:"In relation Placement: JobIDâ†’Company, {Position,Company}â†’Salary. According to which of the following rules does {JobID,Position}â†’Salary hold?",

 options:["Primary Key","Foreign Key","Partial Key with Identifying Relationship","Candidate Key"], correct:2},

{q:"Consider the query to retrieve the most senior professor (by startYear): SELECT p1.name FROM professor p1 WHERE p1.startYear ____ (SELECT p2.startYear FROM professor p2). Which is the correct filler for the blank?",

let current = 0;
let score = 0;
let answered = new Array(QUESTIONS.length).fill(false);
let userAnswers = new Array(QUESTIONS.length).fill(-1);

const letters = ['A','B','C','D'];
const card = document.getElementById('card');
const nextBtn = document.getElementById('nextBtn');
const progressLabel = document.getElementById('progressLabel');
const progressFill = document.getElementById('progressFill');
const scoreTag = document.getElementById('scoreTag');
const liveScore = document.getElementById('liveScore');

function renderQuestion(){
  const item = QUESTIONS[current];
  progressLabel.textContent = `Question ${current+1} of ${QUESTIONS.length}`;
  progressFill.style.width = `${(current/QUESTIONS.length)*100}%`;

  let html = `<div class="q-number">Q${current+1}</div>`;
  html += `<p class="q-text">${item.q}</p>`;
  html += `<div class="options" id="optionsWrap">`;
  item.options.forEach((opt,i)=>{
    html += `<div class="option" data-idx="${i}"><span class="letter">${letters[i]}</span><span>${opt}</span></div>`;
  });
  html += `</div><div id="feedbackWrap"></div>`;
  card.innerHTML = html;

  nextBtn.disabled = true;
  nextBtn.textContent = current === QUESTIONS.length-1 ? 'Finish â†’' : 'Next â†’';

  const already = answered[current];
  document.querySelectorAll('.option').forEach(el=>{
    el.addEventListener('click', ()=>selectOption(el));
  });

  if(already){
    lockOptions(userAnswers[current]);
  }

  updateScoreTags();
}

function selectOption(el){
  if(answered[current]) return;
  const idx = parseInt(el.dataset.idx);
  const item = QUESTIONS[current];
  answered[current] = true;
  userAnswers[current] = idx;
  if(idx === item.correct) score++;
  lockOptions(idx);
  updateScoreTags();
  nextBtn.disabled = false;
}

function lockOptions(chosenIdx){
  const item = QUESTIONS[current];
  document.querySelectorAll('.option').forEach(el=>{
    const idx = parseInt(el.dataset.idx);
    el.classList.remove('selected');
    if(idx === item.correct){
      el.classList.add('correct');
    } else if(idx === chosenIdx){
      el.classList.add('incorrect');
    }
  });
  const fb = document.getElementById('feedbackWrap');
  const isCorrect = chosenIdx === item.correct;
  fb.innerHTML = `<div class="feedback ${isCorrect?'good':'bad'}">${isCorrect ? 'âœ“ Correct â€” +1 mark' : 'âœ— Incorrect â€” 0 marks. Correct answer: '+letters[item.correct]}</div>`;
  nextBtn.disabled = false;
}

function updateScoreTags(){
  const answeredCount = answered.filter(Boolean).length;
  scoreTag.textContent = `Score ${score} / ${QUESTIONS.length}`;
  liveScore.textContent = `${answeredCount} answered آ· ${score} correct so far`;
}

nextBtn.addEventListener('click', ()=>{
  if(current < QUESTIONS.length-1){
    current++;
    renderQuestion();
    window.scrollTo({top:0,behavior:'smooth'});
  } else {
    showResults();
  }
});

function showResults(){
  document.getElementById('quizArea').style.display = 'none';
  const area = document.getElementById('resultsArea');
  area.style.display = 'block';
  const pct = Math.round((score/QUESTIONS.length)*100);
  let msg = "Solid work.";
  if(pct >= 90) msg = "Outstanding â€” near-mastery of the material.";
  else if(pct >= 75) msg = "Strong performance â€” a few gaps to review below.";
  else if(pct >= 50) msg = "Decent grasp â€” worth revisiting the misses below.";
  else msg = "Time to go back over the fundamentals â€” review the misses below.";

  let reviewHtml = '<div class="review-list">';
  QUESTIONS.forEach((item,i)=>{
    const correct = userAnswers[i] === item.correct;
    reviewHtml += `<div class="review-item">
      <span><span class="rq">Q${i+1}</span> ${correct ? '<span class="tick">âœ“</span>' : '<span class="cross">âœ—</span>'} ${item.q.length>90?item.q.slice(0,90)+'â€¦':item.q}</span>
    </div>`;
  });
  reviewHtml += '</div>';

  area.innerHTML = `
    <div class="card results">
      <div class="q-number">Final Result</div>
      <div class="big-score">${score} / ${QUESTIONS.length}</div>
      <div class="out-of">marks scored (+1 correct, 0 wrong)</div>
      <div class="pct">${pct}%</div>
      <p class="msg">${msg}</p>
      <div class="btn-row">
        <button class="btn-primary" onclick="location.reload()">Retake Quiz</button>
      </div>
      ${reviewHtml}
    </div>
  `;
}

renderQuestion();
</script>

</html>
